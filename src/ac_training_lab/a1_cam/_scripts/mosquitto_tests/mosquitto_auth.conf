# Mosquitto configuration with authentication and ACL
# For testing MQTT communication with credentials and topic filters

# Allow anonymous connections (set to false for auth testing)
allow_anonymous false

# Password file location
password_file /tmp/mosquitto_passwd

# ACL (Access Control List) file location
acl_file /tmp/mosquitto_acl

# Listeners
listener 1883 localhost

# Logging
log_type all
log_dest stdout
